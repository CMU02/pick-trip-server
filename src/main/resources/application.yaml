spring:
  application:
    name: PickTrip

  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create # 배포 시에는 Validate로 변경.
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  # AI 일정 생성 (OpenAI). API 키는 .env 로 주입하며 Git 에 커밋하지 않는다.
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
          model: ${OPENAI_MODEL:gpt-5.1}