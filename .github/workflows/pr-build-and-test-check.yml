name: PR Build & Test Check

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: picktrip_test
          MYSQL_DATABASE: picktrip_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드 (테스트 제외)
        run: ./gradlew build -x test

      - name: 테스트 실행
        run: ./gradlew test
        env:
          DB_URL: localhost
          DB_PORT: 3306
          DB_SCHEMA: picktrip_test
          DB_USERNAME: root
          DB_PASSWORD: picktrip_test
          PUBLIC_DATA_PORTAL_KEY: ci-dummy-key
          JWT_SECRET_KEY: ci-dummy-secret-key-must-be-long-enough-for-hmac

      - name: 테스트 결과 리포트
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/
          retention-days: 7
